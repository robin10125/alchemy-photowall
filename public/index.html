<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchemy Photo-Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --surface: #111111;
      --text: #ffffff;
      --text-dim: #b5b5b5;
      --accent: #00e5ff;
      --accent-2: #ff2ed1;
      --highlight: #ffe24a;
      --accent-glow: rgba(0,229,255,0.28);
      --col-gap: 6px;
      --reel-speed: 40s;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 14% 18%, rgba(0,229,255,0.22) 0%, rgba(0,229,255,0) 42%),
                  radial-gradient(circle at 84% 80%, rgba(255,46,209,0.2) 0%, rgba(255,46,209,0) 42%),
                  linear-gradient(160deg, #030303 0%, #090909 55%, #111111 100%);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
    }

    /* ─── Top Bar ───────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: linear-gradient(180deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.22) 100%);
      pointer-events: none;
    }
    .topbar > * { pointer-events: auto; }

    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .logo .logo-main { color: #ffffff; }
    .logo .logo-accent {
      background: linear-gradient(90deg, var(--highlight), var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(255,226,74,0.2);
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: linear-gradient(90deg, var(--highlight), var(--accent), var(--accent-2));
      color: #0a0a0a;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .upload-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .upload-btn svg { width: 16px; height: 16px; }

    /* ─── Reel Container ────────────────────────── */
    .reels-container {
      position: relative;
      height: 100vh;
      padding: 0 var(--col-gap);
      overflow: hidden;
    }

    .reel-stream {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: var(--col-gap);
      will-change: transform;
      animation: scrollUp var(--reel-speed) linear infinite;
    }

    /* Fade edges */
    .reels-container::before,
    .reels-container::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 120px;
      z-index: 2;
      pointer-events: none;
    }
    .reels-container::before {
      top: 0;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    }
    .reels-container::after {
      bottom: 0;
      background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
    }

    .reel-grid {
      display: grid;
      grid-template-columns: repeat(var(--columns, 5), minmax(0, 1fr));
      gap: var(--col-gap);
    }

    .reels-container.is-paused .reel-stream {
      animation-play-state: paused;
    }

    @keyframes scrollUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    /* ─── Photo Cards ───────────────────────────── */
    .photo-card {
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      background: var(--surface);
      grid-column: span var(--col-span, 1);
    }
    .photo-card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .photo-card:hover img {
      transform: scale(1.04);
    }

    .photo-card.is-active {
      z-index: 120;
    }

    .photo-card.is-active img {
      transform: scale(1.07);
    }

    /* Subtle shine on hover */
    .photo-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .photo-card:hover::after { opacity: 1; }

    /* ─── Photo Preview ─────────────────────────── */
    .photo-preview {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 110;
    }

    .photo-preview.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-preview img {
      border-radius: 8px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
      max-width: min(92vw, 1100px);
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* ─── Empty State ───────────────────────────── */
    .empty-state {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      z-index: 10;
    }
    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
    }
    .empty-state p {
      color: var(--text-dim);
      max-width: 360px;
      line-height: 1.6;
    }

    /* ─── Count Badge ───────────────────────────── */
    .photo-count {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 18px;
      background: rgba(8, 8, 8, 0.84);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 226, 74, 0.28);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .photo-count span { color: var(--accent); font-weight: 700; }

    /* ─── Responsive ────────────────────────────── */
    @media (max-width: 900px) {
      .reels-container { padding: 0 4px; }
      .reel-grid, .reel-stream { gap: 4px; }
    }
    @media (max-width: 600px) {
      :root { --reel-speed: 30s; }
      .topbar { padding: 12px 16px; }
      .logo { font-size: 1.1rem; }
      .upload-btn { padding: 8px 16px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="logo"><span class="logo-main">Alchemy</span> <span class="logo-accent">Photo-Wall</span></div>
    <a href="/upload.html" class="upload-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Upload Photo
    </a>
  </header>

  <!-- Reels -->
  <div class="reels-container" id="reelsContainer"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <h2>No photos yet</h2>
    <p>Be the first to upload a photo. It'll appear here once approved.</p>
    <a href="/upload.html" class="upload-btn">Upload a Photo</a>
  </div>

  <!-- Count -->
  <div class="photo-count" id="photoCount" style="display:none;">
    <span id="countNum">0</span> photos on the wall
  </div>

  <div class="photo-preview" id="photoPreview" aria-hidden="true">
    <img id="photoPreviewImg" alt="Expanded community photo" />
  </div>

  <script>
    function getColumnCount() {
      return window.innerWidth < 600 ? 3 : window.innerWidth < 900 ? 4 : 5;
    }
    const POLL_INTERVAL = 8000; // poll every 8s
    const API_BASE = '';

    let currentImages = [];
    let container = document.getElementById('reelsContainer');
    const photoPreview = document.getElementById('photoPreview');
    const photoPreviewImg = document.getElementById('photoPreviewImg');
    const isTouchDevice = window.matchMedia('(hover: none), (pointer: coarse)').matches;
    let activeCard = null;

    function setReelsPaused(shouldPause) {
      container.classList.toggle('is-paused', shouldPause);
    }

    function closePreview() {
      photoPreview.classList.remove('is-visible');
      photoPreview.setAttribute('aria-hidden', 'true');
      photoPreviewImg.removeAttribute('src');
      if (activeCard) {
        activeCard.classList.remove('is-active');
        activeCard = null;
      }
      setReelsPaused(false);
    }

    function openPreview(card, imgData, lockOpen) {
      const source = imgData.url || imgData.thumbUrl;
      if (!source) return;

      if (activeCard && activeCard !== card) {
        activeCard.classList.remove('is-active');
      }

      activeCard = card;
      activeCard.classList.add('is-active');

      const preloadImage = new Image();
      preloadImage.onload = () => {
        const maxWidth = Math.min(window.innerWidth * 0.92, 1100);
        const maxHeight = window.innerHeight * 0.88;
        const naturalWidth = preloadImage.naturalWidth || maxWidth;
        const naturalHeight = preloadImage.naturalHeight || maxHeight;
        const scale = Math.min(maxWidth / naturalWidth, maxHeight / naturalHeight, 1);

        photoPreviewImg.style.width = `${Math.round(naturalWidth * scale)}px`;
        photoPreviewImg.style.height = `${Math.round(naturalHeight * scale)}px`;
      };
      preloadImage.src = source;

      photoPreviewImg.src = source;
      photoPreview.classList.add('is-visible');
      photoPreview.setAttribute('aria-hidden', 'false');
      photoPreview.dataset.locked = lockOpen ? 'true' : 'false';
      setReelsPaused(true);
    }

    // ─── Fetch images ────────────────────────────
    async function fetchImages() {
      try {
        const res = await fetch(`${API_BASE}/api/images`);
        if (!res.ok) return;
        const data = await res.json();
        return data.images || [];
      } catch (e) {
        console.warn('Failed to fetch images:', e);
        return null;
      }
    }

    // ─── Build reel columns ──────────────────────
    function buildReels(images) {
      container.innerHTML = '';

      if (images.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('photoCount').style.display = 'none';
        return;
      }

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('photoCount').style.display = 'block';
      document.getElementById('countNum').textContent = images.length;

      const columnCount = getColumnCount();
      container.style.setProperty('--columns', columnCount);

      const stream = document.createElement('div');
      stream.className = 'reel-stream';

      const firstPass = document.createElement('div');
      firstPass.className = 'reel-grid';

      const secondPass = document.createElement('div');
      secondPass.className = 'reel-grid';
      secondPass.setAttribute('aria-hidden', 'true');

      const allGrids = [firstPass, secondPass];

      images.forEach((img) => {
        allGrids.forEach((grid) => {
          const card = document.createElement('div');
          card.className = 'photo-card';

          const imgEl = document.createElement('img');
          imgEl.src = img.thumbUrl || img.url;
          imgEl.alt = 'Community photo';
          imgEl.loading = 'lazy';
          imgEl.onerror = () => { card.style.display = 'none'; };

          imgEl.addEventListener('load', () => {
            const aspectRatio = imgEl.naturalWidth / Math.max(imgEl.naturalHeight, 1);
            let colSpan = 1;

            if (aspectRatio >= 2.4) {
              colSpan = Math.min(3, columnCount);
            } else if (aspectRatio >= 1.6) {
              colSpan = Math.min(2, columnCount);
            }

            card.style.setProperty('--col-span', colSpan);
          });

          card.addEventListener('mouseenter', () => {
            if (!isTouchDevice) openPreview(card, img, false);
          });

          card.addEventListener('mouseleave', () => {
            if (!isTouchDevice && photoPreview.dataset.locked !== 'true') closePreview();
          });

          card.addEventListener('click', () => {
            const isAlreadyActive = activeCard === card && photoPreview.classList.contains('is-visible');
            if (isAlreadyActive && photoPreview.dataset.locked === 'true') {
              closePreview();
              return;
            }
            openPreview(card, img, true);
          });

          card.appendChild(imgEl);
          grid.appendChild(card);
        });
      });

      stream.appendChild(firstPass);
      stream.appendChild(secondPass);

      // Vary speed a little on each rebuild
      const speedVariance = 0.85 + Math.random() * 0.3;
      stream.style.animationDuration = (42 * speedVariance) + 's';

      container.appendChild(stream);
    }

    // ─── Init & Poll ─────────────────────────────
    async function init() {
      const images = await fetchImages();
      if (images) {
        currentImages = images;
        buildReels(images);
      }
    }

    async function poll() {
      const images = await fetchImages();
      if (images && JSON.stringify(images.map(i=>i.id)) !== JSON.stringify(currentImages.map(i=>i.id))) {
        currentImages = images;
        buildReels(images);
      }
    }

    init();
    setInterval(poll, POLL_INTERVAL);

    photoPreview.addEventListener('click', closePreview);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && photoPreview.classList.contains('is-visible')) {
        closePreview();
      }
    });

    // Rebuild on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => buildReels(currentImages), 300);
    });
  </script>
</body>
</html>
