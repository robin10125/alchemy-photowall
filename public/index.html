<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchemy Photo-Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --surface: #111111;
      --text: #ffffff;
      --text-dim: #b5b5b5;
      --accent: #00e5ff;
      --accent-2: #ff2ed1;
      --highlight: #ffe24a;
      --accent-glow: rgba(0,229,255,0.28);
      --col-gap: 6px;
      --reel-speed: 40s;
      --photo-max-height: 33vh;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 14% 18%, rgba(0,229,255,0.22) 0%, rgba(0,229,255,0) 42%),
                  radial-gradient(circle at 84% 80%, rgba(255,46,209,0.2) 0%, rgba(255,46,209,0) 42%),
                  linear-gradient(160deg, #030303 0%, #090909 55%, #111111 100%);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
    }

    /* ─── Top Bar ───────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: linear-gradient(180deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.22) 100%);
      pointer-events: none;
    }
    .topbar > * { pointer-events: auto; }

    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .logo .logo-main { color: #ffffff; }
    .logo .logo-accent {
      background: linear-gradient(90deg, var(--highlight), var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(255,226,74,0.2);
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: linear-gradient(90deg, var(--highlight), var(--accent), var(--accent-2));
      color: #0a0a0a;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .upload-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .upload-btn svg { width: 16px; height: 16px; }

    /* ─── Reel Container ────────────────────────── */
    .reels-container {
      position: relative;
      height: 100vh;
      padding: 0 var(--col-gap);
      overflow: hidden;
    }

    .reel-columns {
      display: grid;
      grid-template-columns: repeat(var(--columns, 5), minmax(0, 1fr));
      gap: var(--col-gap);
      height: 100%;
    }

    .reel-column {
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .reel-stream {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: var(--col-gap);
      will-change: transform;
      animation: scrollUp var(--reel-speed) linear infinite;
    }

    .reel-column[data-direction="down"] .reel-stream {
      animation-name: scrollDown;
    }

    /* Fade edges */
    .reels-container::before,
    .reels-container::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 120px;
      z-index: 2;
      pointer-events: none;
    }
    .reels-container::before {
      top: 0;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    }
    .reels-container::after {
      bottom: 0;
      background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
    }

    .reel-stack {
      display: flex;
      flex-direction: column;
      gap: var(--col-gap);
    }

    .reels-container.is-paused .reel-stream {
      animation-play-state: paused;
    }

    @keyframes scrollUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    @keyframes scrollDown {
      0% { transform: translateY(-50%); }
      100% { transform: translateY(0); }
    }
    /* ─── Photo Cards ───────────────────────────── */
    .photo-card {
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      background: var(--surface);
      width: 100%;
      height: var(--card-height);
      max-height: var(--photo-max-height);
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .photo-card[data-crop='portrait'] img,
    .photo-card[data-crop='portrait-clamp'] img,
    .photo-card[data-crop='landscape-focus'] img,
    .photo-card[data-crop='landscape-wide'] img {
      object-fit: cover;
    }

    .photo-card[data-crop='landscape-focus'] img {
      transform: scale(1.06);
    }

    .photo-card[data-crop='landscape-wide'] img {
      transform: scale(1.12);
    }
    .photo-card.is-active {
      z-index: 120;
    }

    .photo-card.is-active img {
      transform: scale(var(--active-scale, 1.07));
    }

    /* Subtle shine overlay */
    .photo-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    /* ─── Photo Preview ─────────────────────────── */
    .photo-preview {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 110;
    }

    .photo-preview.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-preview img {
      border-radius: 8px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
      max-width: min(92vw, 1100px);
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* ─── Empty State ───────────────────────────── */
    .empty-state {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      z-index: 10;
    }
    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
    }
    .empty-state p {
      color: var(--text-dim);
      max-width: 360px;
      line-height: 1.6;
    }

    /* ─── Count Badge ───────────────────────────── */
    .photo-count {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 18px;
      background: rgba(8, 8, 8, 0.84);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 226, 74, 0.28);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .photo-count span { color: var(--accent); font-weight: 700; }

    /* ─── Responsive ────────────────────────────── */
    @media (max-width: 900px) {
      .reels-container { padding: 0 4px; }
      .reel-columns, .reel-stack, .reel-stream { gap: 4px; }
    }
    @media (max-width: 600px) {
      :root { --reel-speed: 30s; }
      .topbar { padding: 12px 16px; }
      .logo { font-size: 1.1rem; }
      .upload-btn { padding: 8px 16px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="logo"><span class="logo-main">Alchemy</span> <span class="logo-accent">Photo-Wall</span></div>
    <a href="/upload.html" class="upload-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Upload Photo
    </a>
  </header>

  <!-- Reels -->
  <div class="reels-container" id="reelsContainer"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <h2>No photos yet</h2>
    <p>Be the first to upload a photo. It'll appear here once approved.</p>
    <a href="/upload.html" class="upload-btn">Upload a Photo</a>
  </div>

  <!-- Count -->
  <div class="photo-count" id="photoCount" style="display:none;">
    <span id="countNum">0</span> photos on the wall
  </div>

  <div class="photo-preview" id="photoPreview" aria-hidden="true">
    <img id="photoPreviewImg" alt="Expanded community photo" />
  </div>

  <script>
    function getColumnCount() {
      return 3;
    }
    const POLL_INTERVAL = 8000; // poll every 8s
    const API_BASE = '';

    let currentImages = [];
    let container = document.getElementById('reelsContainer');
    const photoPreview = document.getElementById('photoPreview');
    const photoPreviewImg = document.getElementById('photoPreviewImg');
    let activeCard = null;

    function getColumnDirection(columnIndex, columnCount) {
      const middleIndex = Math.floor(columnCount / 2);
      return Math.abs(columnIndex - middleIndex) % 2 === 0 ? 'up' : 'down';
    }

    function getCardLayout(naturalWidth, naturalHeight, cardWidth) {
      const viewportMaxHeight = Math.max(window.innerHeight * 0.33, 140);
      const safeHeight = Math.max(naturalHeight, 1);
      const aspectRatio = naturalWidth / safeHeight;
      const safeWidth = Math.max(cardWidth, 1);
      const baseHeight = safeWidth / Math.max(aspectRatio, 0.01);
      const layout = {
        crop: 'portrait',
        cardHeight: Math.min(baseHeight, viewportMaxHeight),
        activeScale: 1.07,
      };

      if (aspectRatio < 1) {
        if (baseHeight > viewportMaxHeight) {
          layout.crop = 'portrait-clamp';
          layout.cardHeight = viewportMaxHeight;
        }
        return layout;
      }

      layout.crop = 'landscape-focus';
      layout.activeScale = 1.12;
      layout.cardHeight = Math.min(baseHeight * 1.12, viewportMaxHeight);

      if (aspectRatio >= 1.8) {
        layout.crop = 'landscape-wide';
        layout.activeScale = 1.16;
        layout.cardHeight = Math.min(baseHeight * 1.22, viewportMaxHeight);
      }

      return layout;
    }

    function setReelsPaused(shouldPause) {
      container.classList.toggle('is-paused', shouldPause);
    }

    function closePreview() {
      photoPreview.classList.remove('is-visible');
      photoPreview.setAttribute('aria-hidden', 'true');
      photoPreviewImg.removeAttribute('src');
      if (activeCard) {
        activeCard.classList.remove('is-active');
        activeCard = null;
      }
      setReelsPaused(false);
    }

    function openPreview(card, imgData, lockOpen) {
      const source = imgData.url || imgData.thumbUrl;
      if (!source) return;

      if (activeCard && activeCard !== card) {
        activeCard.classList.remove('is-active');
      }

      activeCard = card;
      activeCard.classList.add('is-active');

      const preloadImage = new Image();
      preloadImage.onload = () => {
        const maxWidth = Math.min(window.innerWidth * 0.92, 1100);
        const maxHeight = window.innerHeight * 0.88;
        const naturalWidth = preloadImage.naturalWidth || maxWidth;
        const naturalHeight = preloadImage.naturalHeight || maxHeight;
        const scale = Math.min(maxWidth / naturalWidth, maxHeight / naturalHeight, 1);

        photoPreviewImg.style.width = `${Math.round(naturalWidth * scale)}px`;
        photoPreviewImg.style.height = `${Math.round(naturalHeight * scale)}px`;
      };
      preloadImage.src = source;

      photoPreviewImg.src = source;
      photoPreview.classList.add('is-visible');
      photoPreview.setAttribute('aria-hidden', 'false');
      photoPreview.dataset.locked = lockOpen ? 'true' : 'false';
      setReelsPaused(true);
    }

    // ─── Fetch images ────────────────────────────
    async function fetchImages() {
      try {
        const res = await fetch(`${API_BASE}/api/images`);
        if (!res.ok) return;
        const data = await res.json();
        return data.images || [];
      } catch (e) {
        console.warn('Failed to fetch images:', e);
        return null;
      }
    }

    // ─── Build reel columns ──────────────────────
    function buildReels(images) {
      container.innerHTML = '';

      if (images.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('photoCount').style.display = 'none';
        return;
      }

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('photoCount').style.display = 'block';
      document.getElementById('countNum').textContent = images.length;

      const columnCount = getColumnCount();
      container.style.setProperty('--columns', columnCount);

      const columns = Array.from({ length: columnCount }, () => []);
      images.forEach((img, index) => {
        columns[index % columnCount].push(img);
      });

      const columnsWrap = document.createElement('div');
      columnsWrap.className = 'reel-columns';

      columns.forEach((columnImages, columnIndex) => {
        const reelColumn = document.createElement('div');
        reelColumn.className = 'reel-column';
        reelColumn.dataset.direction = getColumnDirection(columnIndex, columnCount);

        const stream = document.createElement('div');
        stream.className = 'reel-stream';

        const firstPass = document.createElement('div');
        firstPass.className = 'reel-stack';

        const secondPass = document.createElement('div');
        secondPass.className = 'reel-stack';
        secondPass.setAttribute('aria-hidden', 'true');

        const sourceImages = columnImages.length ? columnImages : images;

        [firstPass, secondPass].forEach((stack) => {
          sourceImages.forEach((img) => {
            const card = document.createElement('div');
            card.className = 'photo-card';

            const imgEl = document.createElement('img');
            imgEl.src = img.thumbUrl || img.url;
            imgEl.alt = 'Community photo';
            imgEl.loading = 'lazy';
            imgEl.onerror = () => { card.style.display = 'none'; };

            imgEl.addEventListener('load', () => {
              const cardWidth = card.getBoundingClientRect().width;
              const layout = getCardLayout(imgEl.naturalWidth, imgEl.naturalHeight, cardWidth);
              card.dataset.crop = layout.crop;
              card.style.setProperty('--card-height', `${Math.round(layout.cardHeight)}px`);
              card.style.setProperty('--active-scale', layout.activeScale);
            });

            card.addEventListener('click', () => {
              const isAlreadyActive = activeCard === card && photoPreview.classList.contains('is-visible');
              if (isAlreadyActive && photoPreview.dataset.locked === 'true') {
                closePreview();
                return;
              }
              openPreview(card, img, true);
            });

            card.appendChild(imgEl);
            stack.appendChild(card);
          });
        });

        stream.appendChild(firstPass);
        stream.appendChild(secondPass);

        const speedVariance = 0.88 + Math.random() * 0.24;
        stream.style.animationDuration = `${Math.round((44 + columnIndex * 2) * speedVariance)}s`;

        reelColumn.appendChild(stream);
        columnsWrap.appendChild(reelColumn);
      });

      container.appendChild(columnsWrap);
    }

    // ─── Init & Poll ─────────────────────────────
    async function init() {
      const images = await fetchImages();
      if (images) {
        currentImages = images;
        buildReels(images);
      }
    }

    async function poll() {
      const images = await fetchImages();
      if (images && JSON.stringify(images.map(i=>i.id)) !== JSON.stringify(currentImages.map(i=>i.id))) {
        currentImages = images;
        buildReels(images);
      }
    }

    init();
    setInterval(poll, POLL_INTERVAL);

    photoPreview.addEventListener('click', closePreview);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && photoPreview.classList.contains('is-visible')) {
        closePreview();
      }
    });

    // Rebuild on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => buildReels(currentImages), 300);
    });
  </script>
</body>
</html>
